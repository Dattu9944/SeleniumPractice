# Profile toggle
run.mobile.tests=false

# Appium server
appium.server.url=http://127.0.0.1:4723

# Android capability setup
platformName=Android
deviceName=Android Emulator
automationName=UiAutomator2

# Use app.path if you want to install from APK
app.path=

# Or use already installed app package/activity
app.package=com.example.android
app.activity=.MainActivity

# Timeouts
implicit.wait.seconds=10

